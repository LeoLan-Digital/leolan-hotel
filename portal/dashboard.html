<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Account — LeoLan Digital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0e1621;color:#e8eaed;min-height:100vh;padding:0 0 80px}
.header{background:#17212b;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a3a4a}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo img{width:32px;height:32px;object-fit:contain}
.header-logo span{font-weight:700;font-size:16px}
.header-code{color:#5e81f4;font-size:13px;font-weight:600}
.logout{background:transparent;border:1px solid #2a3a4a;color:#8a9bb8;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer}
.content{padding:16px;max-width:600px;margin:0 auto}
.card{background:#17212b;border-radius:14px;padding:18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:#8a9bb8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a2a3a;font-size:14px}
.row:last-child{border-bottom:none}
.row-label{color:#8a9bb8}
.row-value{font-weight:600;color:#e8eaed}
.badge{background:#5e81f420;color:#5e81f4;border:1px solid #5e81f4;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700}
.progress-bar{background:#0e1621;border-radius:6px;height:8px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;background:#4cd97b;transition:width 0.3s}
.progress-fill.yellow{background:#f4a527}
.progress-fill.red{background:#e8647c}
.credit-row{display:flex;justify-content:space-between;margin-bottom:6px}
.credit-label{color:#8a9bb8;font-size:13px}
.credit-value{font-size:13px;font-weight:600}
.btn{display:block;background:#5e81f4;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-top:6px}
.btn.orange{background:#f4a527}
.loading{text-align:center;padding:60px 20px;color:#8a9bb8}
</style>
</head>
<body>
<div id="loading" class="loading">Loading your account...</div>
<div id="main" style="display:none">
  <div class="header">
    <div class="header-logo">
      <img src="https://hotel.leolan.net/logo.svg" alt="LeoLan" onerror="this.style.display='none'">
      <span>My Account</span>
    </div>
    <div>
      <span class="header-code" id="headerCode"></span>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <!-- Plan -->
    <div class="card">
      <div class="card-title">Your Plan</div>
      <div class="row"><span class="row-label">Package</span><span id="planName" class="badge">—</span></div>
      <div class="row"><span class="row-label">Sector</span><span class="row-value" id="planSector">—</span></div>
      <div class="row"><span class="row-label">Status</span><span class="row-value" style="color:#4cd97b">Active ✓</span></div>
    </div>
    <!-- Credits -->
    <div class="card">
      <div class="card-title">Message Credits</div>
      <div class="credit-row">
        <span class="credit-label">Used</span>
        <span class="credit-value" id="creditsUsed">—</span>
      </div>
      <div class="credit-row">
        <span class="credit-label">Limit</span>
        <span class="credit-value" id="creditsLimit">—</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="creditBar" style="width:0%"></div>
      </div>
    </div>
    <!-- Billing -->
    <div class="card">
      <div class="card-title">Billing Info</div>
      <div class="row"><span class="row-label">Name</span><span class="row-value" id="billName">—</span></div>
      <div class="row"><span class="row-label">Email</span><span class="row-value" id="billEmail">—</span></div>
      <div class="row"><span class="row-label">Company</span><span class="row-value" id="billCompany">—</span></div>
      <div class="row"><span class="row-label">Member since</span><span class="row-value" id="billSince">—</span></div>
      <button onclick="toggleEdit()" style="margin-top:12px;background:transparent;border:1px solid #2a3a4a;color:#5e81f4;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;width:100%">✏️ Edit Billing Info</button>
    </div>

    <!-- Edit Billing Form -->
    <div class="card" id="editCard" style="display:none">
      <div class="card-title">Edit Billing Info</div>
      <label style="color:#8a9bb8;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block">Company Name</label>
      <input id="e_company" type="text" style="width:100%;background:#0e1621;color:#e8eaed;border:1px solid #2a3a4a;border-radius:10px;padding:10px;font-size:14px;margin-bottom:10px;box-sizing:border-box">
      <label style="color:#8a9bb8;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block">Street + House Number</label>
      <input id="e_address" type="text" style="width:100%;background:#0e1621;color:#e8eaed;border:1px solid #2a3a4a;border-radius:10px;padding:10px;font-size:14px;margin-bottom:10px;box-sizing:border-box">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input id="e_zip" type="text" placeholder="ZIP" style="width:120px;flex-shrink:0;background:#0e1621;color:#e8eaed;border:1px solid #2a3a4a;border-radius:10px;padding:10px;font-size:14px">
        <input id="e_city" type="text" placeholder="City" style="flex:1;background:#0e1621;color:#e8eaed;border:1px solid #2a3a4a;border-radius:10px;padding:10px;font-size:14px">
      </div>
      <label style="color:#8a9bb8;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block">VAT ID (optional)</label>
      <input id="e_vatid" type="text" placeholder="DE123456789" style="width:100%;background:#0e1621;color:#e8eaed;border:1px solid #2a3a4a;border-radius:10px;padding:10px;font-size:14px;margin-bottom:14px;box-sizing:border-box">
      <div id="editErr" style="color:#e8647c;font-size:13px;margin-bottom:10px;display:none"></div>
      <button onclick="saveBilling()" style="width:100%;background:#5e81f4;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer" id="saveBtn">Save Changes</button>
      <button onclick="toggleEdit()" style="width:100%;background:transparent;border:1px solid #2a3a4a;color:#8a9bb8;border-radius:10px;padding:10px;font-size:14px;cursor:pointer;margin-top:8px">Cancel</button>
    </div>
    <!-- Invoices -->
    <div class="card" id="invoiceCard">
      <div class="card-title">Invoices</div>
      <div id="invoiceList"><p style="color:#8a9bb8;font-size:14px">No invoices yet.</p></div>
    </div>
    <!-- Actions -->
    <div class="card">
      <div class="card-title">Upgrade / Add-ons</div>
      <a class="btn orange" id="upgradeBtn" href="#">Buy More Credits or Upgrade →</a>
    </div>
  </div>
</div>

<script>
var customerCode = (new URLSearchParams(window.location.search)).get('code') || '';
if (!customerCode) { window.location.href = '/portal/'; }

function logout() {
  window.location.href = '/portal/';
}

var xhr = new XMLHttpRequest();
xhr.open('POST', 'https://n8n.leolan.net/webhook/hotel-dashboard', true);
xhr.setRequestHeader('Content-Type', 'application/json');
xhr.onload = function() {
  var data = {};
  try { data = JSON.parse(xhr.responseText); } catch(e) {}
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  var acc = data.account || {};
  var usage = data.usageStats || {};
  var used = usage.messagesUsed || 0;
  var limit = usage.messagesLimit || usage.messageLimit || 500;
  var ratio = limit > 0 ? Math.min(used / limit, 1) : 0;

  document.getElementById('headerCode').textContent = customerCode;
  document.getElementById('planName').textContent = (acc.paket || 'starter').toUpperCase();
  document.getElementById('planSector').textContent = acc.sector || 'hotel';
  document.getElementById('creditsUsed').textContent = used;
  document.getElementById('creditsLimit').textContent = limit;
  document.getElementById('creditBar').style.width = Math.round(ratio * 100) + '%';
  var bar = document.getElementById('creditBar');
  if (ratio >= 0.9) bar.className = 'progress-fill red';
  else if (ratio >= 0.7) bar.className = 'progress-fill yellow';
  document.getElementById('billName').textContent = acc.name || '—';
  document.getElementById('billEmail').textContent = acc.email || '—';
  document.getElementById('billCompany').textContent = acc.companyName || '—';
  document.getElementById('billSince').textContent = (acc.createdAt || '').substring(0, 10) || '—';
  // Pre-fill edit form
  document.getElementById('e_company').value = acc.companyName || '';
  document.getElementById('e_address').value = acc.address || '';
  document.getElementById('e_zip').value = acc.zip || '';
  document.getElementById('e_city').value = acc.city || '';
  document.getElementById('e_vatid').value = acc.vatId || '';

  document.getElementById('upgradeBtn').href = '/onboarding/enterprise/?code=' + encodeURIComponent(customerCode);

  // Invoices
  var invoices = acc.invoices || [];
  var invList = document.getElementById('invoiceList');
  if (invoices.length > 0) {
    var html = '';
    for (var i = 0; i < invoices.length; i++) {
      var inv = invoices[i];
      html += '<div class="row"><span class="row-label">' + (inv.date || '').substring(0,10) + ' — ' + (inv.description || 'Invoice') + '</span>';
      html += '<span class="row-value">' + (inv.amount || '—') + '</span></div>';
    }
    invList.innerHTML = html;
  }
};
xhr.onerror = function() {
  document.getElementById('loading').textContent = 'Connection error.';
};
xhr.send(JSON.stringify({customerCode: customerCode}));

  function toggleEdit() {
    var card = document.getElementById('editCard');
    card.style.display = card.style.display === 'none' ? 'block' : 'none';
  }

  function saveBilling() {
    var btn = document.getElementById('saveBtn');
    var err = document.getElementById('editErr');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Saving...';

    var payload = {
      action: 'update-billing',
      customerCode: customerCode,
      companyName: document.getElementById('e_company').value.trim(),
      address: document.getElementById('e_address').value.trim(),
      zip: document.getElementById('e_zip').value.trim(),
      city: document.getElementById('e_city').value.trim(),
      vatId: document.getElementById('e_vatid').value.trim()
    };

    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://n8n.leolan.net/webhook/hotel-dashboard', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
      var data = {};
      try { data = JSON.parse(xhr.responseText); } catch(e) {}
      if (data.success) {
        document.getElementById('billCompany').textContent = payload.companyName || '—';
        document.getElementById('editCard').style.display = 'none';
      } else {
        err.textContent = data.error || 'Error saving.';
        err.style.display = 'block';
      }
    };
    xhr.onerror = function() { btn.disabled = false; btn.textContent = 'Save Changes'; };
    xhr.send(JSON.stringify(payload));
  }
</script>
</body>
</html>
