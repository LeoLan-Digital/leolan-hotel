<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hotel Portal — LeoLan Digital</title>
<style>
body{margin:0;padding:20px;font-family:-apple-system,sans-serif;background:#0e1621;color:#e8eaed;min-height:100vh}
.card{background:#17212b;border-radius:16px;padding:28px;max-width:420px;margin:40px auto}
.logo{text-align:center;margin-bottom:24px}
.logo img{width:64px;height:64px;object-fit:contain}
h1{font-size:20px;font-weight:700;text-align:center;margin:0 0 4px}
p.sub{color:#8a9bb8;font-size:14px;text-align:center;margin:0 0 24px}
label{display:block;color:#8a9bb8;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
input{width:100%;background:#0e1621;color:#e8eaed;border:1px solid #2a3a4a;border-radius:10px;padding:12px;font-size:15px;box-sizing:border-box;margin-bottom:14px}
button{width:100%;background:#5e81f4;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
button:disabled{opacity:0.5;cursor:not-allowed}
.err{background:#ef444420;border:1px solid #ef4444;border-radius:8px;padding:10px;color:#ef4444;font-size:13px;margin-bottom:14px;display:none}
.link{text-align:center;margin-top:16px;font-size:13px;color:#8a9bb8}
.link a{color:#5e81f4}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="https://hotel.leolan.net/logo.svg" alt="LeoLan" onerror="this.style.display='none'">
    <h1>Hotel Customer Portal</h1>
    <p class="sub">LeoLan Digital</p>
  </div>
  <div class="err" id="err"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="you@hotel.com">
  <label>Password</label>
  <input type="password" id="pw" placeholder="••••••••">
  <button id="btn" onclick="login()">Sign In</button>
  <div class="link">No account? <a href="/onboarding/enterprise/">Register here →</a></div>
</div>

<script>
function login() {
  var email = document.getElementById('email').value.trim();
  var pw = document.getElementById('pw').value;
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  
  err.style.display = 'none';
  
  if (!email || !pw) {
    err.textContent = 'Please enter email and password.';
    err.style.display = 'block';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://n8n.leolan.net/webhook/hotel-login', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    var raw = xhr.responseText;
    err.textContent = 'Response: ' + raw.substring(0,200);
    err.style.display = 'block';
    var data = {};
    try { data = JSON.parse(raw); } catch(e) { return; }
    if (data.success && data.customerCode) {
      window.location.href = '/portal/dashboard.html?code=' + encodeURIComponent(data.customerCode);
    } else if (data.blocked) {
      err.textContent = 'Too many attempts. Please wait 15 minutes.';
      err.style.display = 'block';
    } else {
      err.textContent = data.error || 'Invalid credentials.';
      err.style.display = 'block';
    }
  };
  xhr.onerror = function() {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
  };
  xhr.send(JSON.stringify({email: email, password: pw}));
}
</script>
</body>
</html>
